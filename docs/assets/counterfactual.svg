<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 330" width="920" height="330" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6e7681"/>
    </marker>
    <marker id="p" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#bc8cff"/>
    </marker>
  </defs>

  <rect width="920" height="330" rx="16" fill="#0d1117"/>
  <rect x="0.5" y="0.5" width="919" height="329" rx="16" fill="none" stroke="#21262d"/>

  <text x="44" y="50" fill="#e6edf3" font-size="20" font-weight="700">Counterfactual verification</text>
  <text x="44" y="73" fill="#8b949e" font-size="14">Patch one suspect output, re-run the real agent, watch the outcome flip. That's proof.</text>

  <!-- BEFORE row -->
  <text x="44" y="129" fill="#8b949e" font-size="12.5" font-weight="700">before</text>
  <rect x="104" y="104" width="116" height="44" rx="9" fill="#161b22" stroke="#f85149" stroke-width="1.8"/>
  <text x="162" y="125" fill="#e6edf3" font-size="11.5" text-anchor="middle" font-family="ui-monospace, Menlo, monospace">get_population</text>
  <text x="162" y="140" fill="#f85149" font-size="10.5" text-anchor="middle">✗ HTTP 503</text>
  <line x1="220" y1="126" x2="236" y2="126" stroke="#6e7681" stroke-width="1.5" marker-end="url(#g)"/>
  <rect x="236" y="104" width="86" height="44" rx="9" fill="#161b22" stroke="#30363d" stroke-width="1.4"/>
  <text x="279" y="130" fill="#c9d1d9" font-size="11.5" text-anchor="middle" font-family="ui-monospace, Menlo, monospace">analyze</text>
  <line x1="322" y1="126" x2="338" y2="126" stroke="#6e7681" stroke-width="1.5" marker-end="url(#g)"/>
  <rect x="338" y="104" width="86" height="44" rx="9" fill="#161b22" stroke="#30363d" stroke-width="1.4"/>
  <text x="381" y="130" fill="#c9d1d9" font-size="11.5" text-anchor="middle" font-family="ui-monospace, Menlo, monospace">agent</text>
  <rect x="440" y="104" width="74" height="44" rx="9" fill="#2d1417" stroke="#f85149" stroke-width="1.6"/>
  <text x="477" y="131" fill="#f85149" font-size="13" font-weight="700" text-anchor="middle">FAIL</text>

  <!-- patch arrow -->
  <path d="M 162 150 L 162 230" fill="none" stroke="#bc8cff" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#p)"/>
  <text x="178" y="194" fill="#d2b3ff" font-size="11.5" font-weight="600">patch get_population</text>
  <text x="178" y="210" fill="#8b949e" font-size="11">→ "2.1 million"</text>

  <!-- AFTER row -->
  <text x="44" y="257" fill="#8b949e" font-size="12.5" font-weight="700">after</text>
  <rect x="104" y="232" width="116" height="44" rx="9" fill="#161b22" stroke="#3fb950" stroke-width="1.8"/>
  <text x="162" y="253" fill="#e6edf3" font-size="11.5" text-anchor="middle" font-family="ui-monospace, Menlo, monospace">get_population</text>
  <text x="162" y="268" fill="#3fb950" font-size="10.5" text-anchor="middle">✓ 2.1 million</text>
  <line x1="220" y1="254" x2="236" y2="254" stroke="#6e7681" stroke-width="1.5" marker-end="url(#g)"/>
  <rect x="236" y="232" width="86" height="44" rx="9" fill="#161b22" stroke="#30363d" stroke-width="1.4"/>
  <text x="279" y="258" fill="#c9d1d9" font-size="11.5" text-anchor="middle" font-family="ui-monospace, Menlo, monospace">analyze</text>
  <line x1="322" y1="254" x2="338" y2="254" stroke="#6e7681" stroke-width="1.5" marker-end="url(#g)"/>
  <rect x="338" y="232" width="86" height="44" rx="9" fill="#161b22" stroke="#30363d" stroke-width="1.4"/>
  <text x="381" y="258" fill="#c9d1d9" font-size="11.5" text-anchor="middle" font-family="ui-monospace, Menlo, monospace">agent</text>
  <rect x="440" y="232" width="74" height="44" rx="9" fill="#0f2417" stroke="#3fb950" stroke-width="1.6"/>
  <text x="477" y="259" fill="#3fb950" font-size="12" font-weight="700" text-anchor="middle">CLEAN</text>

  <!-- verdict panel -->
  <rect x="588" y="100" width="296" height="180" rx="13" fill="#0f1e14" stroke="#3fb950" stroke-width="1.6"/>
  <text x="736" y="158" fill="#3fb950" font-size="26" font-weight="800" text-anchor="middle">✅ CONFIRMED</text>
  <text x="736" y="192" fill="#c9d1d9" font-size="13" text-anchor="middle">Fixing this one output flips</text>
  <text x="736" y="211" fill="#c9d1d9" font-size="13" text-anchor="middle">the entire run to clean.</text>
  <text x="736" y="244" fill="#8b949e" font-size="12.5" text-anchor="middle" font-style="italic">Causal proof — not correlation.</text>
</svg>
