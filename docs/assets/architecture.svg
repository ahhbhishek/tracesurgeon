<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" width="960" height="300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6e7681"/>
    </marker>
    <marker id="ap" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#bc8cff"/>
    </marker>
  </defs>

  <rect width="960" height="300" rx="16" fill="#0d1117"/>
  <rect x="0.5" y="0.5" width="959" height="299" rx="16" fill="none" stroke="#21262d"/>

  <text x="44" y="50" fill="#e6edf3" font-size="20" font-weight="700">How it works</text>
  <text x="44" y="74" fill="#8b949e" font-size="14">Three lines around your <tspan font-family="ui-monospace, Menlo, monospace" fill="#c9d1d9">agent.invoke(...)</tspan> — the rest is automatic.</text>

  <!-- stage boxes -->
  <!-- 1 agent -->
  <rect x="24" y="110" width="166" height="76" rx="11" fill="#161b22" stroke="#58a6ff" stroke-width="1.6"/>
  <text x="107" y="142" fill="#e6edf3" font-size="13.5" font-weight="600" text-anchor="middle">LangGraph agent</text>
  <text x="107" y="162" fill="#8b949e" font-size="11" text-anchor="middle">your code, unchanged</text>

  <!-- 2 interceptor -->
  <rect x="214" y="110" width="166" height="76" rx="11" fill="#161b22" stroke="#58a6ff" stroke-width="1.6"/>
  <text x="297" y="138" fill="#e6edf3" font-size="13.5" font-weight="600" text-anchor="middle">TraceInterceptor</text>
  <text x="297" y="157" fill="#8b949e" font-size="11" text-anchor="middle">callback hook</text>
  <text x="297" y="172" fill="#3fb950" font-size="10.5" text-anchor="middle">thread-safe · crash-proof</text>

  <!-- 3 jsonl -->
  <rect x="404" y="110" width="160" height="76" rx="11" fill="#161b22" stroke="#30363d" stroke-width="1.6"/>
  <text x="484" y="138" fill="#e6edf3" font-size="13.5" font-weight="600" text-anchor="middle" font-family="ui-monospace, Menlo, monospace">trace.jsonl</text>
  <text x="484" y="158" fill="#8b949e" font-size="11" text-anchor="middle">every node's in / out</text>
  <text x="484" y="172" fill="#8b949e" font-size="11" text-anchor="middle">timing · errors</text>

  <!-- 4 dag -->
  <rect x="588" y="110" width="166" height="76" rx="11" fill="#161b22" stroke="#bc8cff" stroke-width="1.6"/>
  <text x="671" y="138" fill="#e6edf3" font-size="13.5" font-weight="600" text-anchor="middle">data-flow DAG</text>
  <text x="671" y="157" fill="#8b949e" font-size="11" text-anchor="middle">reconstructed</text>
  <text x="671" y="172" fill="#8b949e" font-size="11" text-anchor="middle">from timestamps</text>

  <!-- 5 report -->
  <rect x="778" y="110" width="158" height="76" rx="11" fill="#161b22" stroke="#3fb950" stroke-width="1.6"/>
  <text x="857" y="138" fill="#e6edf3" font-size="13.5" font-weight="600" text-anchor="middle">root-cause report</text>
  <text x="857" y="157" fill="#8b949e" font-size="11" text-anchor="middle">introducer + score</text>
  <text x="857" y="172" fill="#8b949e" font-size="11" text-anchor="middle">+ remediation</text>

  <!-- arrows -->
  <line x1="192" y1="148" x2="210" y2="148" stroke="#6e7681" stroke-width="1.6" marker-end="url(#a)"/>
  <line x1="382" y1="148" x2="400" y2="148" stroke="#6e7681" stroke-width="1.6" marker-end="url(#a)"/>
  <line x1="566" y1="148" x2="584" y2="148" stroke="#6e7681" stroke-width="1.6" marker-end="url(#a)"/>
  <line x1="756" y1="148" x2="774" y2="148" stroke="#6e7681" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- verify loop -->
  <path d="M 857 188 C 857 232, 484 232, 484 232 L 200 232" fill="none" stroke="#bc8cff" stroke-width="1.8" stroke-dasharray="6 5" marker-end="url(#ap)"/>
  <rect x="196" y="216" width="300" height="34" rx="8" fill="#1c1430" stroke="#bc8cff" stroke-width="1.2"/>
  <text x="346" y="238" fill="#d2b3ff" font-size="12" text-anchor="middle" font-weight="600">verify(): patch the suspect → re-run → causal proof</text>
  <text x="700" y="238" fill="#8b949e" font-size="11.5">optional second pass</text>
</svg>
