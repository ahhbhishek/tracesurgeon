<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 430" width="920" height="430" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="fwd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6e7681"/>
    </marker>
    <marker id="back" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3fb950"/>
    </marker>
  </defs>

  <rect width="920" height="430" rx="16" fill="#0d1117"/>
  <rect x="0.5" y="0.5" width="919" height="429" rx="16" fill="none" stroke="#21262d"/>

  <text x="44" y="56" fill="#e6edf3" font-size="23" font-weight="700">Blame hoarding</text>
  <text x="44" y="82" fill="#8b949e" font-size="14.5">A failure is loudest where it surfaces — but the real cause is upstream, and quiet.</text>

  <!-- backward blame arc -->
  <path d="M 765 176 C 765 120, 135 120, 135 176" fill="none" stroke="#3fb950" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#back)"/>
  <text x="450" y="114" fill="#3fb950" font-size="13.5" font-weight="600" text-anchor="middle">TraceSurgeon flows blame backward to the introducer</text>

  <!-- tags -->
  <text x="135" y="170" fill="#f85149" font-size="11.5" font-weight="700" text-anchor="middle" letter-spacing="0.5">ROOT CAUSE</text>
  <text x="765" y="170" fill="#d29922" font-size="11.5" font-weight="700" text-anchor="middle" letter-spacing="0.5">SYMPTOM</text>

  <!-- node 1: root cause -->
  <rect x="45" y="182" width="180" height="84" rx="11" fill="#161b22" stroke="#f85149" stroke-width="2"/>
  <text x="135" y="212" fill="#e6edf3" font-size="14" font-weight="600" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">get_population</text>
  <text x="135" y="234" fill="#f85149" font-size="12.5" text-anchor="middle">↳ ERROR: HTTP 503</text>
  <text x="135" y="252" fill="#8b949e" font-size="11.5" text-anchor="middle">its inputs were clean</text>

  <!-- node 2 -->
  <rect x="295" y="182" width="150" height="84" rx="11" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="370" y="218" fill="#c9d1d9" font-size="14" font-weight="600" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">analyze</text>
  <text x="370" y="238" fill="#8b949e" font-size="11.5" text-anchor="middle">propagates it</text>

  <!-- node 3 -->
  <rect x="515" y="182" width="150" height="84" rx="11" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="590" y="218" fill="#c9d1d9" font-size="14" font-weight="600" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">compose</text>
  <text x="590" y="238" fill="#8b949e" font-size="11.5" text-anchor="middle">propagates it</text>

  <!-- node 4: symptom -->
  <rect x="685" y="182" width="180" height="84" rx="11" fill="#161b22" stroke="#d29922" stroke-width="2"/>
  <text x="775" y="212" fill="#e6edf3" font-size="14" font-weight="600" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">agent answer</text>
  <text x="775" y="234" fill="#d29922" font-size="12.5" text-anchor="middle">"I couldn't finish…"</text>
  <text x="775" y="252" fill="#8b949e" font-size="11.5" text-anchor="middle">the loud final step</text>

  <!-- forward arrows -->
  <line x1="227" y1="224" x2="291" y2="224" stroke="#6e7681" stroke-width="1.6" marker-end="url(#fwd)"/>
  <line x1="447" y1="224" x2="511" y2="224" stroke="#6e7681" stroke-width="1.6" marker-end="url(#fwd)"/>
  <line x1="667" y1="224" x2="681" y2="224" stroke="#6e7681" stroke-width="1.6" marker-end="url(#fwd)"/>

  <!-- annotations -->
  <text x="135" y="300" fill="#3fb950" font-size="12.5" text-anchor="middle" font-weight="600">✓ TraceSurgeon points here</text>
  <text x="775" y="300" fill="#f85149" font-size="12.5" text-anchor="middle" font-weight="600">✗ naive attribution points here</text>

  <!-- divider -->
  <line x1="44" y1="340" x2="876" y2="340" stroke="#21262d"/>

  <!-- caption -->
  <text x="44" y="372" fill="#8b949e" font-size="13">A node is the <tspan fill="#e6edf3" font-weight="600">introducer</tspan> when it carries an error but none of its</text>
  <text x="44" y="392" fill="#8b949e" font-size="13">upstream ancestors do. That single rule is what flows blame past the symptom to the origin.</text>
</svg>
